<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>CRM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>хз</h2>

<form id="clientForm">
  <input type="hidden" id="editId">
  
  <input type="text" id="name" placeholder="Имя" style="width:140px;" required>
  <input type="text" id="course" placeholder="Направление" style="width:120px;" required>
  <input type="number" id="budget" placeholder="Бюджет" style="width:100px;" required>
  
  <select id="status" style="width:110px;">
    <option value="new">Новый</option>
    <option value="inWork">В работе</option>
    <option value="closed">Завершён</option>
  </select>
  
  <button type="submit" id="submitBtn">Добавить</button>
  <button type="button" id="cancelBtn" style="display:none;">Отмена</button>
</form>

<input type="text" id="searchInput" placeholder="Поиск..." style="width:100%; padding:8px; margin-bottom:10px;">

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Имя</th>
      <th>Направление</th>
      <th>Бюджет</th>
      <th>Статус</th>
      <th>Действия</th>
    </tr>
  </thead>
  <tbody id="clientsTable"></tbody>
</table>

<script src="app.js"></script>
</body>
</html>
